name: PROD Refresh Snapshot

on:
  workflow_dispatch:

jobs:
  build-prod-snapshot:
    runs-on: windows-latest
    timeout-minutes: 30
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build PROD sample snapshot
        run: npm run etl:sample:prod

      - name: Upload PROD snapshot artifact
        uses: actions/upload-artifact@v4
        with:
          name: prod-snapshot
          path: artifacts/prod/latest-snapshot.json
          if-no-files-found: error
