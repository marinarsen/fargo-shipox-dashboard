name: Deploy Dashboard Pages

on:
  workflow_dispatch:
  push:
    branches:
      - main

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Refresh Mongo snapshot when secret exists
        shell: pwsh
        env:
          MONGODB_URI: ${{ secrets.MONGODB_URI }}
        run: |
          if ($env:MONGODB_URI) {
            npm run etl:mongo:snapshot
          } else {
            Write-Host "MONGODB_URI is not configured; using committed public/generatedSnapshot.json"
          }

      - name: Build static dashboard
        run: npm run build

      - name: Configure Pages
        uses: actions/configure-pages@v5

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: dist

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
