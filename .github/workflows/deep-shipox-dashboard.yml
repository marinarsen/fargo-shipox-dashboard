name: Глубокое обновление Shipox (3 месяца)

on:
  workflow_dispatch:
    inputs:
      mode:
        description: "Что обновить"
        required: true
        default: "last_3_months"
        type: choice
        options:
          - last_3_months
          - full_2026
  schedule:
    # GitHub cron works in UTC. Sunday 21:00 UTC = Monday 02:00 Asia/Tashkent.
    - cron: "0 21 * * 0"

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: shipox-dashboard-pages
  cancel-in-progress: false

jobs:
  update-and-deploy:
    runs-on: ubuntu-latest
    timeout-minutes: 90
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    env:
      SHIPOX_CONCURRENCY: "4"
      SHIPOX_REQUEST_TIMEOUT_MS: "120000"
      SHIPOX_MARKETPLACE_ID: "307345429"
      SHIPOX_USERNAME: ${{ secrets.SHIPOX_USERNAME }}
      SHIPOX_PASSWORD: ${{ secrets.SHIPOX_PASSWORD }}
      SHIPOX_ID_TOKEN: ${{ secrets.SHIPOX_ID_TOKEN }}
      SHIPOX_CUSTOMER_ID: ${{ secrets.SHIPOX_CUSTOMER_ID }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Check Shipox secrets
        shell: pwsh
        run: |
          if (-not $env:SHIPOX_ID_TOKEN -and (-not $env:SHIPOX_USERNAME -or -not $env:SHIPOX_PASSWORD)) {
            Write-Error "Add SHIPOX_USERNAME and SHIPOX_PASSWORD, or SHIPOX_ID_TOKEN, in this repository: Settings -> Secrets and variables -> Actions."
          }

      - name: Set 3-month Tashkent window
        shell: bash
        run: |
          if [[ "${{ github.event.inputs.mode }}" == "full_2026" ]]; then
            echo "SNAPSHOT_FROM_SHIPOX=2026-01-01 00:00" >> "$GITHUB_ENV"
            echo "Deep refresh: full 2026 by Asia/Tashkent time."
          else
            echo "SNAPSHOT_FROM_SHIPOX=$(TZ=Asia/Tashkent date -d '3 months ago' '+%Y-%m-%d 00:00')" >> "$GITHUB_ENV"
            echo "Deep refresh: last 3 months by Asia/Tashkent time."
          fi
          echo "SNAPSHOT_TO_SHIPOX=$(TZ=Asia/Tashkent date '+%Y-%m-%d 23:59')" >> "$GITHUB_ENV"
          echo "SHIPOX_CHUNK_DAYS=14" >> "$GITHUB_ENV"
          echo "SHIPOX_LIMIT_PAGES=0" >> "$GITHUB_ENV"

      - name: Download current published snapshot
        shell: bash
        run: |
          mkdir -p artifacts/base
          if curl -fsSL "https://marinarsen.github.io/fargo-shipox-dashboard/generatedSnapshot.json" -o artifacts/base/generatedSnapshot.json; then
            echo "SHIPOX_BASE_SNAPSHOT=artifacts/base/generatedSnapshot.json" >> "$GITHUB_ENV"
            echo "Using current published snapshot as merge base."
          else
            echo "Current published snapshot is not available; building a fresh window."
          fi

      - name: Build fresh Shipox snapshot
        run: npm run etl:shipox:snapshot

      - name: Build static dashboard
        run: npm run build

      - name: Configure Pages
        uses: actions/configure-pages@v5

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: dist

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
