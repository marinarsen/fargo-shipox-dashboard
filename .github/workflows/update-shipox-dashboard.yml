name: Обновить dashboard из Shipox

on:
  workflow_dispatch:
  schedule:
    - cron: "30 3 * * *"

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: shipox-dashboard-pages
  cancel-in-progress: true

jobs:
  update-and-deploy:
    runs-on: ubuntu-latest
    timeout-minutes: 90
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    env:
      SNAPSHOT_FROM_SHIPOX: "2026-01-01 00:00"
      SNAPSHOT_TO_SHIPOX: "2026-12-31 23:59"
      SHIPOX_CHUNK_DAYS: "14"
      SHIPOX_LIMIT_PAGES: "0"
      SHIPOX_CONCURRENCY: "4"
      SHIPOX_REQUEST_TIMEOUT_MS: "120000"
      SHIPOX_MARKETPLACE_ID: "307345429"
      SHIPOX_USERNAME: ${{ secrets.SHIPOX_USERNAME }}
      SHIPOX_PASSWORD: ${{ secrets.SHIPOX_PASSWORD }}
      SHIPOX_ID_TOKEN: ${{ secrets.SHIPOX_ID_TOKEN }}
      SHIPOX_CUSTOMER_ID: ${{ secrets.SHIPOX_CUSTOMER_ID }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Check Shipox secrets
        shell: pwsh
        run: |
          if (-not $env:SHIPOX_ID_TOKEN -and (-not $env:SHIPOX_USERNAME -or -not $env:SHIPOX_PASSWORD)) {
            Write-Error "Add SHIPOX_USERNAME and SHIPOX_PASSWORD, or SHIPOX_ID_TOKEN, in this repository: Settings -> Secrets and variables -> Actions."
          }

      - name: Build fresh Shipox snapshot
        run: npm run etl:shipox:snapshot

      - name: Build static dashboard
        run: npm run build

      - name: Configure Pages
        uses: actions/configure-pages@v5

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: dist

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
